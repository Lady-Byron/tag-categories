name: manual-build
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show env
        run: |
          node -v
          npm -v
          pwd
          ls -la

      - name: Install webpack toolchain
        run: npm install -D webpack webpack-cli flarum-webpack-config

      - name: Install deps (no lockfile ok)
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Preflight: verify entrypoints
        run: |
          ls -la src || true
          ls -la src/admin || true
          ls -la src/forum || true
          # 至少需要一个入口（admin 或 forum）
          if ! ls src/admin/index.* 1>/dev/null 2>&1 && ! ls src/forum/index.* 1>/dev/null 2>&1; then
            echo "❌ missing src/{admin,forum}/index.*"; exit 1; fi

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: List dist
        run: |
          ls -la dist || true

      - name: Upload dist artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/**
          if-no-files-found: ignore
